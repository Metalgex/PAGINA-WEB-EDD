<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <div class="container">

        <h1>Bienvenido a nuestro sitio web.</h1>

        <p class="texto">
            Por favor, introduzca su correo electrónico, nombre de usuario y contraseña para continuar.
        </p>

        <form id="loginForm">

            <input type="email" id="correo" placeholder="Email Address" required>

            <input type="text" id="usuario" placeholder="Username" required>

            <input type="password" id="password" placeholder="Password" required>

            <button type="submit">
                Sign in
            </button>

        </form>

    </div>

    <script>
    const form = document.getElementById("loginForm");

    const usuarioCorrecto = "sfacundo";
    const passwordCorrecta = "1234";

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const correo = document.getElementById("correo").value;
        const usuario = document.getElementById("usuario").value;
        const password = document.getElementById("password").value;
        
        if (usuario === usuarioCorrecto && password === passwordCorrecta) {

            localStorage.setItem("correo", correo);
            localStorage.setItem("usuario", usuario);

            window.location.href = "../P0/index.html";

        } else {
            alert("Usuario o contraseña incorrectos");
        }
    });
    </script>

</body>

</html>
